<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0" >
	<meta name="theme-color" content="#ffd000" >
	<meta name="description" content="Simple clock with stopwatch and auto dark mode" >
	<meta name="keywords" content="clock, stopwatch" >
	<meta name="author" content="Chetan Saini" >
	<title>Clock</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" ></script>
	<script src="https://chetansainiakamysteriousman.on.drv.tw/web_store/js_lib/clock/v1/clock.min.js" ></script>
	<link rel="stylesheet" href="index.css" />
	<script src="index.js" ></script>
	<link rel="icon" href="pwa/app-icons/favicon.png" />
	<link rel="manifest" href="pwa/manifest.json" />
	<script src="pwa/app.js" ></script>
</head>
<body>

<nav class="nav_bar" >

	<div>
		<button id="fullscreenBtn" title="Fullscreen" class="btn remixicon_os20" type="button" value="fullscreen" >fullscreen</button>
		<button id="stopwatchBtn" title="Stopwatch" class="btn remixicon_os20" type="button" >timer</button>
	</div>

</nav>

<main class="main" >

	<section id="clockBlock" class="clock_block" >

		<div>
			<svg id="svgClock" class="svg_clock" viewBox="0 0 24 24" >
				<circle class="center_1" cx="12" cy="12" r="0.4" />
				<line class="minutes_hand" x1="12" y1="12" x2="12" y2="4" />
				<line class="minutes_hand_2" x1="12" y1="11" x2="12" y2="4" />
				<line class="hours_hand" x1="12" y1="12" x2="12" y2="6" />
				<line class="hours_hand_2" x1="12" y1="11" x2="12" y2="6" />
				<circle class="center" cx="12" cy="12" r="0.2" />
				<line class="seconds_hand" x1="12" y1="13" x2="12" y2="4" />
			</svg>
		</div>

		<div>
			<div class="date_time" >
				<div id="clockTime" class="time" >
					<span>00:</span><span>00</span><span>:00</span><span>AM</span>
				</div>
				<div id="clockDate" class="date" >Day, 00 Month</div>
			</div>
		</div>

	</section>

	<section id="stopwatchBlock" class="stopwatch_block" >

		<div>
			<div id="stopwatchTime" class="time" >
				<span>00:</span><span>00</span><span>.000</span>
			</div>
		</div>

		<div>
			<button id="startAndStopSWBtn" class="btn" type="button" value="start" >Start</button>
			<button id="resetSWBtn" class="btn" type="button" >Reset</button>
			<button id="lapSWBtn" class="btn" type="button" >Lap</button>
		</div>

		<div class="laps_btn_block" >
			<button id="lapsBtn" class="laps_btn" type="button" >Laps <span class="remixicon_os20" >arrow-right-s</span></button>
		</div>

		<div id="lapsBlock" class="laps_block" ></div>

	</section>

</main>

<footer class="footer" >
	<div>
		<div>Designed &amp; Coded by</div>
		<div>Chetan Saini</div>
	</div>
</footer>
	
</body>
</html>
